site_name: 绘画笔记
site_description: 从零开始的二次元绘画学习之路
site_url: https://betty-momo.github.io/drawing-notes/
use_directory_urls: false

theme:
  name: material
  language: zh
  font:
    text: Noto Sans SC
    code: Fira Code
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: 切换到暗色模式
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: 切换到亮色模式
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.instant
    - navigation.instant.progress
    - navigation.indexes
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.tooltips
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/betty-momo

nav:
  - 首页: index.md
  - 起草:
    - 人体: 起草/人体.md
    - 场景: 起草/场景.md
  - 人体知识: 人体知识.md
  - 场景知识: 场景知识.md
  - 上色流程:
    - 勾线: 上色流程/勾线.md
    - 固有色: 上色流程/固有色.md
    - 色彩知识: 上色流程/色彩知识.md
    - 二分: 上色流程/二分.md
    - 三分: 上色流程/三分.md
    - 闭塞: 上色流程/闭塞.md
    - 灰面: 上色流程/灰面.md
    - 高光: 上色流程/高光.md
    - 反光: 上色流程/反光.md
    - 塑造: 上色流程/塑造.md
    - 光源衰减: 上色流程/光源衰减.md
  - 专题:
    - 眼睛上色: 专题/眼睛上色.md
    - 头发塑造: 专题/头发塑造.md
    - 皮肤塑造: 专题/皮肤塑造.md
    - 衣褶: 专题/衣褶.md
    - 泳装衣褶: 专题/泳装衣褶.md

markdown_extensions:
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.mark
  - pymdownx.keys
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tabbed:
      alternate_style: true
